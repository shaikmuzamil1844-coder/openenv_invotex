services:
  - type: web
    name: openenv-invotex
    env: docker
    region: ohio
    plan: free
    branch: main
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "7860"
      - key: DOMAIN
        value: "email_triage" # You can change this to traffic_control or customer_support later using Render dashboard
